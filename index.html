<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompTIA Tech+ Practice Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>CompTIA Tech+ (FC0-U71)</h1>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="module-title">Module Loading...</p>
        </header>

        <main id="quiz-box">
            <div id="question-text">Loading question...</div>
            <div id="options-container"></div>
            <button id="next-btn" class="hidden">Next Question</button>
        </main>


        <footer id="stats">
            <span>Question <span id="current-q-num">1</span> of <span id="total-q">200</span></span>
            <br>
            <span>Score: <span id="score">0</span></span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
